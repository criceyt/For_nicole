<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>For the most pretty girl 🎀</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Quicksand:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="background-pattern"></div>

    <header>
      <div class="header-content">
        <span class="main-bow">🎀</span>
        <h1>For the most pretty girl in the world</h1>
      </div>
    </header>

    <main class="container">
      <section class="card hero-card">
        <div class="photo-frame">
          <img
            src="https://via.placeholder.com/600x600/ffb7c5/ffffff?text=Tu+Foto+Aquí+🌸"
            alt="Nosotros"
          />
        </div>
        <div class="card-text">
          <h2>Eres especial ✨</h2>
          <p>
            No hay palabras suficientes para decirte lo increíble que eres. Eres
            mi persona favorita.
          </p>
        </div>
      </section>

      <section class="card interactive-card">
        <h3>Un regalo para ti</h3>
        <button id="loveBtn" class="btn-love">¡Tócame! 🎀</button>
      </section>

      <section class="card details-card">
        <ul class="kitty-list">
          <li><span>🍎</span> Tu sonrisa mágica.</li>
          <li><span>🌸</span> Tu forma de ser.</li>
          <li><span>💖</span> Tu gran corazón.</li>
        </ul>
      </section>
    </main>

    <footer>
      <p>Hecho con amor por [Tu Nombre] ❤️</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
